<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belegungsplan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
        #calendar-container { max-width: 860px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 16px; font-size: 1.3rem; color: #333; }

        /* Legende */
        .legend { display: flex; gap: 24px; justify-content: center; margin-bottom: 20px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
        .box { width: 18px; height: 18px; border-radius: 4px; }
        .frei   { background: #28a745; }
        .belegt { background: #dc3545; }

        /* Navigation */
        .nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
        .nav button { background: #555; color: white; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 0.95rem; }
        .nav button:hover { background: #333; }
        .nav h3 { min-width: 200px; text-align: center; font-size: 1.1rem; color: #333; }

        /* Kalendergitter */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .wochentag { text-align: center; font-size: 0.78rem; font-weight: bold; color: #555; padding: 6px 0; }
        .tag {
            text-align: center;
            padding: 10px 4px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            min-height: 42px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tag.frei   { background: #28a745; }
        .tag.belegt { background: #dc3545; }
        .tag.leer   { background: transparent; color: transparent; pointer-events: none; }
        .tag.heute  { outline: 3px solid #0056b3; outline-offset: -2px; }

        #fehler { display: none; color: #dc3545; text-align: center; margin-bottom: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="calendar-container">
    <div class="legend">
        <div class="legend-item"><div class="box frei"></div> Verfügbar</div>
        <div class="legend-item"><div class="box belegt"></div> Gebucht</div>
    </div>
    <p id="fehler">⚠️ termine.txt nicht gefunden – alle Tage werden als verfügbar angezeigt.</p>
    <div class="nav">
        <button onclick="wechsle(-1)">&#8592;</button>
        <h3 id="monatstitel"></h3>
        <button onclick="wechsle(1)">&#8594;</button>
    </div>
    <div class="grid" id="wochentage"></div>
    <div class="grid" id="kalender"></div>
</div>

<script>
const MONATE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const TAGE   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

let heute = new Date();
let aktuell = { jahr: heute.getFullYear(), monat: heute.getMonth() };
let gebuchteTage = [];

// Wochentags-Header einmalig rendern
const wt = document.getElementById('wochentage');
TAGE.forEach(t => { const d = document.createElement('div'); d.className='wochentag'; d.textContent=t; wt.appendChild(d); });

function istGebucht(datum) {
    const d = new Date(datum + 'T00:00:00');
    return gebuchteTage.some(z => {
        return d >= new Date(z.start + 'T00:00:00') && d < new Date(z.end + 'T00:00:00');
    });
}

function renderKalender() {
    const { jahr, monat } = aktuell;
    document.getElementById('monatstitel').textContent = MONATE[monat] + ' ' + jahr;

    const grid = document.getElementById('kalender');
    grid.innerHTML = '';

    const ersterTag = new Date(jahr, monat, 1);
    // Montag = 0, Sonntag = 6
    let wochentag = ersterTag.getDay(); // 0=So, 1=Mo...
    wochentag = (wochentag + 6) % 7;   // Umrechnen auf Mo=0

    const tageImMonat = new Date(jahr, monat + 1, 0).getDate();
    const heutStr = heute.getFullYear() + '-'
        + String(heute.getMonth()+1).padStart(2,'0') + '-'
        + String(heute.getDate()).padStart(2,'0');

    // Leere Zellen vor dem 1.
    for (let i = 0; i < wochentag; i++) {
        const z = document.createElement('div'); z.className='tag leer'; z.textContent='0'; grid.appendChild(z);
    }

    for (let t = 1; t <= tageImMonat; t++) {
        const ds = jahr + '-' + String(monat+1).padStart(2,'0') + '-' + String(t).padStart(2,'0');
        const z = document.createElement('div');
        z.className = 'tag ' + (istGebucht(ds) ? 'belegt' : 'frei');
        if (ds === heutStr) z.classList.add('heute');
        z.textContent = t;
        grid.appendChild(z);
    }
}

function wechsle(delta) {
    aktuell.monat += delta;
    if (aktuell.monat > 11) { aktuell.monat = 0;  aktuell.jahr++; }
    if (aktuell.monat < 0)  { aktuell.monat = 11; aktuell.jahr--; }
    renderKalender();
}

// termine.txt laden
const controller = new AbortController();
const timeout = setTimeout(() => controller.abort(), 6000);

fetch('termine.txt?t=' + Date.now(), { signal: controller.signal })
    .then(r => { clearTimeout(timeout); if (!r.ok) throw new Error(); return r.text(); })
    .then(text => {
        text.split('\n').forEach(zeile => {
            const z = zeile.trim();
            if (!z || z.startsWith('#')) return;
            const teile = z.split(',');
            if (teile.length === 2) {
                gebuchteTage.push({ start: teile[0].trim(), end: teile[1].trim() });
            }
        });
        renderKalender();
    })
    .catch(() => {
        clearTimeout(timeout);
        document.getElementById('fehler').style.display = 'block';
        renderKalender();
    });
</script>
</body>
</html>

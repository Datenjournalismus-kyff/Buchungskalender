<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belegungsplan</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        #calendar-container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .legend { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .box { width: 20px; height: 20px; border-radius: 4px; }
        .frei { background-color: #28a745; }
        .belegt { background-color: #dc3545; }
    </style>
</head>
<body>

<div id="calendar-container">
    <div class="legend">
        <div class="legend-item"><div class="box frei"></div> Verfügbar (Grün)</div>
        <div class="legend-item"><div class="box belegt"></div> Gebucht (Rot)</div>
    </div>
    <div id="calendar"></div>
</div>

<script src="https://jsdelivr.net"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Termine aus der txt-Datei laden
    fetch('termine.txt')
        .then(response => response.text())
        .then(text => {
            const gebuchteTage = [];
            
            // Text zeilenweise splitten
            const zeilen = text.split('\n');
            zeilen.forEach(zeile => {
                // Leerzeichen entfernen
                const bereinigteZeile = zeile.trim();
                if (bereinigteZeile === "") return; // Leere Zeilen überspringen

                const daten = bereinigteZeile.split(',');
                if (daten.length === 2) {
                    gebuchteTage.push({
                        start: daten[0].trim(),
                        end: daten[1].trim()
                    });
                }
            });

            initCalendar(gebuchteTage);
        })
        .catch(error => {
            console.error('Fehler beim Laden der Termine:', error);
            initCalendar([]); 
        });

    function initCalendar(gebuchteTage) {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'de',
            firstDay: 1,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            dayCellDidMount: function(info) {
                var cz = info.date;
                var jahr = cz.getFullYear();
                var monat = String(cz.getMonth() + 1).padStart(2, '0');
                var tag = String(cz.getDate()).padStart(2, '0');
                var datumsString = `${jahr}-${monat}-${tag}`;

                // Prüfen, ob der Tag in einem gebuchten Zeitraum liegt
                var istGebucht = gebuchteTage.some(function(zeitraum) {
                    var start = new Date(zeitraum.start + "T00:00:00");
                    var end = new Date(zeitraum.end + "T00:00:00");
                    var aktuell = new Date(datumsString + "T00:00:00");
                    return aktuell >= start && aktuell < end;
                });

                if (istGebucht) {
                    info.el.style.backgroundColor = '#dc3545';
                    info.el.style.color = '#ffffff';
                } else {
                    info.el.style.backgroundColor = '#28a745';
                    info.el.style.color = '#ffffff';
                }
            }
        });
        calendar.render();
    }
});
</script>
</body>
</html>

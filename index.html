<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belegungsplan Juli 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .calendar-container { max-width: 450px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; margin-top: 0; color: #222; }
        
        /* Legende */
        .legend { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        
        /* Wochentage und Kalenderraster */
        .weekdays, .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 6px; }
        .weekdays div { font-weight: bold; color: #666; padding: 5px 0; font-size: 13px; text-transform: uppercase; }
        
        /* Einzelne Tage */
        .days div { padding: 12px 0; font-weight: 600; border-radius: 6px; color: white; font-size: 15px; }
        
        /* Status-Farben */
        .frei { background-color: #28a745; }   /* Grün */
        .belegt { background-color: #dc3545; } /* Rot */
        .leer { background-color: transparent; } /* Für leere Starttage im Monat */
    </style>
</head>
<body>

<div class="calendar-container">
    <h2>Juli 2026</h2>
    
    <div class="legend">
        <div class="legend-item"><div class="box frei"></div> Frei</div>
        <div class="legend-item"><div class="box belegt"></div> Gebucht</div>
    </div>

    <!-- Wochentage Beschriftung -->
    <div class="weekdays">
        <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
    </div>

    <!-- Die Tage des Monats -->
    <div class="days">
        <!-- Der Juli 2026 startet auf einem Mittwoch. Daher 2 leere Felder für Mo & Di -->
        <div class="leer"></div><div class="leer"></div>
        
        <!-- HIER EINFACH DIE KLASSE VON "frei" ZU "belegt" ÄNDERN WENN GEBUCHT -->
        <div class="belegt">1</div>
        <div class="belegt">2</div>
        <div class="belegt">3</div>
        <div class="belegt">4</div>
        <div class="frei">5</div>
        <div class="frei">6</div>
        <div class="frei">7</div>
        <div class="frei">8</div>
        <div class="frei">9</div>
        <div class="frei">10</div>
        <div class="frei">11</div>
        <div class="belegt">12</div>
        <div class="belegt">13</div>
        <div class="belegt">14</div>
        <div class="frei">15</div>
        <div class="frei">16</div>
        <div class="frei">17</div>
        <div class="frei">18</div>
        <div class="frei">19</div>
        <div class="belegt">20</div>
        <div class="frei">21</div>
        <div class="frei">22</div>
        <div class="frei">23</div>
        <div class="frei">24</div>
        <div class="frei">25</div>
        <div class="frei">26</div>
        <div class="frei">27</div>
        <div class="frei">28</div>
        <div class="frei">29</div>
        <div class="frei">30</div>
        <div class="frei">31</div>
    </div>
</div>

</body>
</html>
